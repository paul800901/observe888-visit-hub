<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, follow">
  <title>頁面已整理｜見觀結構</title>
  <style>
    :root {
      color-scheme: light;
      --bg: var(--paper-bg);
      --paper: var(--surface);
      --text: var(--wood);
      --muted: var(--muted-copy);
      --accent: var(--copper);
      --forest: var(--wood);
      --line: var(--border-soft);
      --shadow: none;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: var(--paper-bg);
    }

    main {
      width: min(680px, 100%);
      padding: 28px;
      display: grid;
      gap: 18px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    p,
    h1 {
      margin: 0;
    }

    h1 {
      font-size: clamp(28px, 5vw, 40px);
      line-height: 1.25;
    }

    p {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.85;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      color: #fff;
      background: var(--accent);
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
    }

    a.secondary {
      background: var(--forest);
    }

    a.ghost {
      color: var(--text);
      background: rgba(87, 63, 48, 0.08);
    }

    @media (max-width: 560px) {
      main {
        padding: 22px;
        border-radius: 20px;
      }

      a {
        width: 100%;
      }
    }
  </style>
  <link rel="stylesheet" href="observe888-design-system.css">
</head>
<body>
  <main>
    <h1>這個舊頁面已經整理到新版網站</h1>
    <p>如果你是從 Google 舊分頁點進來，內容已經改放在新版首頁、身體觀察筆記與導覽入口。舊站連結會等 Google 重新整理後逐步淡出。</p>
    <div class="actions" aria-label="新版網站入口">
      <a href="/">回新版首頁</a>
      <a class="secondary" href="/visit/">前往導覽入口</a>
      <a class="ghost" href="/notes/">看身體觀察筆記</a>
    </div>
  </main>
  <script>
    (function () {
      const legacyPath = window.location.pathname.toLowerCase();
      const incoming = new URLSearchParams(window.location.search);
      let targetPath = null;

      if (legacyPath === '/index.php') {
        targetPath = '/';
      } else if (legacyPath === '/north' || legacyPath === '/north/' || legacyPath === '/north/index.html') {
        targetPath = '/visit/';
      } else if (legacyPath === '/north/pricing' || legacyPath === '/north/pricing/' || legacyPath === '/north/pricing/index.html') {
        targetPath = '/south/pricing/';
      } else if (legacyPath === '/products/car.php') {
        targetPath = '/services/tainan-tuina/';
      } else if (legacyPath === '/album' || legacyPath === '/album/' || legacyPath.indexOf('/album/') === 0) {
        targetPath = '/notes/';
      } else if (legacyPath === '/observations' || legacyPath === '/observations/' || legacyPath.indexOf('/observations/') === 0) {
        targetPath = '/notes/';
      } else if (legacyPath === '/news' || legacyPath === '/news/' || legacyPath.indexOf('/news/') === 0) {
        targetPath = '/notes/';
      } else if (legacyPath === '/paper/other_page.php') {
        targetPath = incoming.get('id') === '11272' ? '/about/' : '/visit/';
      } else if (legacyPath === '/paper/other_select_index.php') {
        targetPath = incoming.get('id') === '3718' ? '/south/pricing/' : '/visit/';
      } else if (legacyPath === '/paper/promotions_index.php') {
        targetPath = '/visit/';
      } else if (legacyPath.indexOf('/paper/') === 0) {
        targetPath = '/notes/';
      } else if (legacyPath.slice(-4) === '.php') {
        targetPath = '/visit/';
      }

      if (!targetPath) {
        return;
      }

      const target = new URL(targetPath, window.location.origin);
      const passthroughKeys = ['gclid', 'gbraid', 'wbraid', 'fbclid', 'msclkid'];

      incoming.forEach(function (value, key) {
        const lowerKey = key.toLowerCase();
        if (lowerKey.indexOf('utm_') === 0 || passthroughKeys.indexOf(lowerKey) !== -1) {
          target.searchParams.append(key, value);
        }
      });

      window.location.replace(target.toString());
    }());
  </script>
</body>
</html>
