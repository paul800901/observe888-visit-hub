<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="format-detection" content="telephone=no">
  <title>認識見觀結構｜身體結構觀察與傳統整復推拿</title>
  <meta name="description" content="認識見觀結構的服務方式。見觀結構以身體結構觀察、傳統整復推拿、姿勢與承重線索整理為核心。">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5ecdf;
      --paper: rgba(255, 251, 245, 0.9);
      --line: rgba(87, 63, 48, 0.14);
      --text: #3f2e22;
      --muted: #6f5a49;
      --accent: #a14f2a;
      --forest: #2e5e4b;
      --shadow: 0 24px 60px rgba(68, 45, 30, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0) 32%),
        linear-gradient(180deg, #fbf6ee 0%, var(--bg) 52%, #f0e4d4 100%);
    }

    a {
      color: inherit;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .shell {
      width: min(960px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 22px 0 56px;
      display: grid;
      gap: 18px;
    }

    .topnav,
    .hero,
    .content-card,
    .cta-strip {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .topnav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(87, 63, 48, 0.07);
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }

    .topnav-brand {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .hero {
      padding: 24px;
      display: grid;
      gap: 14px;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(161, 79, 42, 0.1);
      color: #7e381d;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.2;
    }

    h2 {
      font-size: 20px;
      line-height: 1.45;
    }

    .hero-copy,
    .content-card {
      display: grid;
      gap: 12px;
    }

    p,
    li {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.85;
    }

    .content-card {
      padding: 20px;
    }

    ul {
      margin: 0;
      padding-left: 1.2em;
    }

    li + li {
      margin-top: 8px;
    }

    .article-list {
      display: grid;
      gap: 10px;
    }

    .article-link {
      display: grid;
      gap: 6px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(87, 63, 48, 0.07);
      text-decoration: none;
    }

    .article-link span {
      color: var(--text);
      font-size: 15px;
      font-weight: 800;
      line-height: 1.55;
    }

    .article-link small {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .cta-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 16px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 16px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 16px 28px rgba(126, 56, 29, 0.2);
    }

    .button.is-forest {
      background: var(--forest);
      box-shadow: 0 16px 28px rgba(36, 72, 58, 0.22);
    }

    .button.is-ghost {
      background: rgba(87, 63, 48, 0.07);
      color: var(--text);
      box-shadow: none;
    }

    @media (max-width: 720px) {
      .shell {
        width: min(100vw - 16px, 960px);
        padding: max(12px, env(safe-area-inset-top)) 0 calc(24px + env(safe-area-inset-bottom));
      }

      .hero,
      .content-card,
      .cta-strip {
        border-radius: 22px;
        padding: 18px;
      }

      .button {
        width: 100%;
        min-height: 50px;
        font-size: 16px;
      }
    }
  </style>
  <link rel="canonical" href="https://paul800901.github.io/observe888-visit-hub/about/">
</head>
<body>
  <main class="shell">
    <nav class="topnav" aria-label="頁面導覽">
      <a class="back-link" href="../">回到首頁</a>
      <span class="topnav-brand">見觀結構</span>
    </nav>

    <header class="hero">
      <span class="eyebrow">關於見觀</span>
      <div class="hero-copy">

        <p>見觀結構不是只看單一不舒服的位置，而是協助把身體感受、姿勢、承重、張力與生活負荷整理成可觀察的線索。</p>
        <p>我們以身體結構觀察、傳統整復推拿、姿勢與承重線索整理為核心，協助來訪者在到店前後，更清楚理解自己的身體狀態。</p>
        <p>本站內容不作為診斷、治療或療效承諾。</p>
      </div>
    </header>

    <section class="content-card">
        <h2>可以先從哪裡開始</h2>
        
        <ul>
          <li>先選方便前往的北區店或南區工作室。</li>
          <li>先閱讀身體觀察筆記，整理自己的感受、姿勢與生活負荷。</li>
          <li>到店前後都可以把左右差、承重感與張力變化當作觀察線索。</li>
        </ul>
        
      </section>

    <div class="cta-strip" aria-label="頁面入口">
        <a class="button is-ghost" href="../">回到首頁</a>
        <a class="button is-ghost" href="../notes/">身體觀察筆記</a>
        <a class="button is-forest" href="https://www.observe888.com/">回到導航頁</a>
    </div>
  </main>

  <script src="../observe888-tracking-config.js"></script>
  <script src="../observe888-tracking.js"></script>
  <script>
    const pageTracker = window.Observe888Tracker;
    if (pageTracker && typeof pageTracker.trackPageView === 'function') {
      pageTracker.trackPageView('page_view_about', { page_role: 'about' });
    }
  </script>
</body>
</html>
