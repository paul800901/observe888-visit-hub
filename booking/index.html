<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="format-detection" content="telephone=no">
  <title>預約表單｜見觀結構</title>
  <meta name="description" content="見觀結構預約需求表單。請留下方便店別、日期、時間帶與主要狀況，實際預約仍會由見觀再確認。">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="zh_TW">
  <meta property="og:site_name" content="見觀結構">
  <meta property="og:title" content="預約表單｜見觀結構">
  <meta property="og:description" content="填寫見觀結構預約需求表單，實際時段仍會由 LINE 或電話確認。">
  <meta property="og:url" content="https://www.observe888.com/booking/">
  <meta http-equiv="refresh" content="0; url=https://docs.google.com/forms/d/e/1FAIpQLSf5mBVIXEM4T4fxLQUBqHryQ8bwlhCTV2NVbliopWIYeQ4Law/viewform">
  <link rel="canonical" href="https://www.observe888.com/booking/">
  <style>
    :root {
      color-scheme: light;
      --bg: #f4ecdf;
      --paper: rgba(255, 251, 245, 0.94);
      --line: rgba(87, 63, 48, 0.14);
      --text: #3f2e22;
      --muted: #6f5a49;
      --forest: #2e5e4b;
      --soft: rgba(87, 63, 48, 0.07);
      --shadow: 0 24px 60px rgba(68, 45, 30, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.84), rgba(255, 255, 255, 0) 34%),
        radial-gradient(circle at 86% 12%, rgba(46, 94, 75, 0.14), rgba(46, 94, 75, 0) 23%),
        linear-gradient(180deg, #fbf6ee 0%, var(--bg) 52%, #eee1d0 100%);
      display: grid;
      place-items: center;
      padding: 18px;
    }

    a {
      color: inherit;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .panel {
      width: min(560px, 100%);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--paper);
      box-shadow: var(--shadow);
      display: grid;
      gap: 16px;
    }

    .label {
      color: #7e381d;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(28px, 5vw, 40px);
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.8;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      background: var(--forest);
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      box-shadow: 0 16px 28px rgba(36, 72, 58, 0.22);
    }

    .button.is-ghost {
      background: var(--soft);
      color: var(--text);
      box-shadow: none;
    }

    @media (max-width: 560px) {
      .panel {
        padding: 22px;
        border-radius: 20px;
      }

      .actions {
        display: grid;
      }

      .button {
        width: 100%;
      }
    }
  </style>
  <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "@id": "https://www.observe888.com/booking/#webpage",
  "url": "https://www.observe888.com/booking/",
  "name": "預約表單｜見觀結構",
  "description": "見觀結構預約需求表單入口。送出表單不代表預約成立，實際時段仍會由見觀確認。",
  "inLanguage": "zh-Hant",
  "isPartOf": {
    "@id": "https://www.observe888.com/#website"
  }
}
  </script>
</head>
<body data-page-role="booking">
  <main class="panel">
    <span class="label">Booking form</span>
    <h1>正在開啟預約表單</h1>
    <p>預約資料改由 Google 表單收件。送出不代表預約成立，實際時段仍會由見觀以 LINE 或電話確認。</p>
    <div class="actions">
      <a id="bookingFormLink" class="button" href="https://docs.google.com/forms/d/e/1FAIpQLSf5mBVIXEM4T4fxLQUBqHryQ8bwlhCTV2NVbliopWIYeQ4Law/viewform">填寫預約表單</a>
      <a class="button is-ghost" href="https://line.me/ti/p/~@483yvmiw">改用 LINE 詢問</a>
    </div>
  </main>

  <script src="../observe888-tracking-config.js"></script>
  <script src="../observe888-tracking.js"></script>
  <script>
    (function () {
      const formUrl = 'https://docs.google.com/forms/d/e/1FAIpQLSf5mBVIXEM4T4fxLQUBqHryQ8bwlhCTV2NVbliopWIYeQ4Law/viewform';
      const tracker = window.Observe888Tracker;
      if (tracker && typeof tracker.trackPageView === 'function') {
        tracker.trackPageView('page_view_booking_redirect', { page_role: 'booking' });
      }
      window.setTimeout(function () {
        window.location.replace(formUrl);
      }, 120);
    }());
  </script>
</body>
</html>
