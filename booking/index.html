<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="format-detection" content="telephone=no">
  <title>預約入口｜見觀結構</title>
  <meta name="description" content="見觀結構預約入口。可用 LINE 預約需求表單留下姓名、電話、分店與方便時段，實際時段仍會由見觀再確認。">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="zh_TW">
  <meta property="og:site_name" content="見觀結構">
  <meta property="og:title" content="預約入口｜見觀結構">
  <meta property="og:description" content="用 LINE 預約需求表單留下聯絡資料與方便時段，實際安排仍由見觀確認。">
  <meta property="og:url" content="https://www.observe888.com/booking/">
  <link rel="canonical" href="https://www.observe888.com/booking/">
  <style>
    :root {
      color-scheme: light;
      --bg: #f4ecdf;
      --paper: rgba(255, 251, 245, 0.94);
      --line: rgba(87, 63, 48, 0.14);
      --text: #3f2e22;
      --muted: #6f5a49;
      --forest: #2e5e4b;
      --soft: rgba(87, 63, 48, 0.07);
      --shadow: 0 24px 60px rgba(68, 45, 30, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.84), rgba(255, 255, 255, 0) 34%),
        radial-gradient(circle at 86% 12%, rgba(46, 94, 75, 0.14), rgba(46, 94, 75, 0) 23%),
        linear-gradient(180deg, #fbf6ee 0%, var(--bg) 52%, #eee1d0 100%);
      display: grid;
      place-items: center;
      padding: 18px;
    }

    a {
      color: inherit;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .panel {
      width: min(560px, 100%);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--paper);
      box-shadow: var(--shadow);
      display: grid;
      gap: 16px;
    }

    .label {
      color: #7e381d;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(28px, 5vw, 40px);
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.8;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      background: var(--forest);
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      box-shadow: 0 16px 28px rgba(36, 72, 58, 0.22);
    }

    .button.is-ghost {
      background: var(--soft);
      color: var(--text);
      box-shadow: none;
    }

    .button.is-line {
      background: #06c755;
      color: #fff;
      box-shadow: 0 16px 28px rgba(6, 199, 85, 0.18);
    }

    .button.is-form {
      background: #fff;
      color: var(--forest);
      border: 1px solid rgba(46, 94, 75, 0.22);
      box-shadow: none;
    }

    .hint {
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.48);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .phone-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    @media (max-width: 560px) {
      .panel {
        padding: 22px;
        border-radius: 20px;
      }

      .button {
        width: 100%;
      }

      .phone-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "@id": "https://www.observe888.com/booking/#webpage",
  "url": "https://www.observe888.com/booking/",
  "name": "預約入口｜見觀結構",
  "description": "見觀結構預約入口。可用 LINE 預約需求表單留下聯絡資料與方便時段，實際時段仍會由見觀確認。",
  "inLanguage": "zh-Hant",
  "isPartOf": {
    "@id": "https://www.observe888.com/#website"
  }
}
  </script>
</head>
<body data-page-role="booking">
  <main class="panel">
    <span class="label">Booking</span>
    <h1>用 LINE 留預約需求</h1>
    <p>先留下姓名、手機、想預約的分店與方便時段。送出後不代表預約成立，見觀會再用 LINE 或電話確認實際可安排時間。</p>
    <p class="hint">LINE 表單會自動帶入你的 LINE 身分，送出後不用再回傳「已填」。如果 LINE 表單無法開啟，才改用備用 Google 表單。</p>
    <div class="actions">
      <a id="bookingLineLink" class="button is-line" href="https://liff.line.me/2009616289-t4XZSol1?v=20260525-5&source=website_booking">LINE 預約需求表單</a>
      <div class="phone-row" aria-label="電話預約">
        <a id="bookingNorthPhoneLink" class="button is-ghost" href="tel:062510677">北區電話</a>
        <a id="bookingSouthPhoneLink" class="button is-ghost" href="tel:0973728670">南區電話</a>
      </div>
      <a id="bookingFormLink" class="button is-form" href="https://docs.google.com/forms/d/e/1FAIpQLSf5mBVIXEM4T4fxLQUBqHryQ8bwlhCTV2NVbliopWIYeQ4Law/viewform">備用 Google 表單</a>
    </div>
  </main>

  <script src="../observe888-tracking-config.js"></script>
  <script src="../observe888-tracking.js"></script>
  <script>
    (function () {
      const tracker = window.Observe888Tracker;
      if (tracker && typeof tracker.trackPageView === 'function') {
        tracker.trackPageView('page_view_booking_entry', { page_role: 'booking' });
      }
    }());
  </script>
</body>
</html>
