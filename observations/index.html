<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="format-detection" content="telephone=no">
  <title>內容已整併到身體觀察筆記｜見觀結構</title>
  <meta name="description" content="原本的 observations 入口已整併到身體觀察筆記，請改由 notes 入口閱讀主題總整理與公開文章。">
  <meta http-equiv="refresh" content="0; url=../notes/">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5ecdf;
      --paper: rgba(255, 251, 245, 0.9);
      --line: rgba(87, 63, 48, 0.14);
      --text: #3f2e22;
      --muted: #6f5a49;
      --accent: #a14f2a;
      --forest: #2e5e4b;
      --shadow: 0 24px 60px rgba(68, 45, 30, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0) 32%),
        linear-gradient(180deg, #fbf6ee 0%, var(--bg) 52%, #f0e4d4 100%);
    }

    a {
      color: inherit;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .shell {
      width: min(960px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 22px 0 56px;
      display: grid;
      gap: 18px;
    }

    .topnav,
    .hero,
    .content-card,
    .cta-strip {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .topnav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(87, 63, 48, 0.07);
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }

    .topnav-brand {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .hero {
      padding: 24px;
      display: grid;
      gap: 14px;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(161, 79, 42, 0.1);
      color: #7e381d;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.2;
    }

    h2 {
      font-size: 20px;
      line-height: 1.45;
    }

    .hero-copy,
    .content-card {
      display: grid;
      gap: 12px;
    }

    p,
    li {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.85;
    }

    .content-card {
      padding: 20px;
    }

    ul {
      margin: 0;
      padding-left: 1.2em;
    }

    li + li {
      margin-top: 8px;
    }

    .article-list {
      display: grid;
      gap: 10px;
    }

    .article-link {
      display: grid;
      gap: 6px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(87, 63, 48, 0.07);
      text-decoration: none;
    }

    .article-link span {
      color: var(--text);
      font-size: 15px;
      font-weight: 800;
      line-height: 1.55;
    }

    .article-link small {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .cta-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 16px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 16px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 16px 28px rgba(126, 56, 29, 0.2);
    }

    .button.is-forest {
      background: var(--forest);
      box-shadow: 0 16px 28px rgba(36, 72, 58, 0.22);
    }

    .button.is-ghost {
      background: rgba(87, 63, 48, 0.07);
      color: var(--text);
      box-shadow: none;
    }

    @media (max-width: 720px) {
      .shell {
        width: min(100vw - 16px, 960px);
        padding: max(12px, env(safe-area-inset-top)) 0 calc(24px + env(safe-area-inset-bottom));
      }

      .hero,
      .content-card,
      .cta-strip {
        border-radius: 22px;
        padding: 18px;
      }

      .button {
        width: 100%;
        min-height: 50px;
        font-size: 16px;
      }
    }
  </style>
  <link rel="canonical" href="https://paul800901.github.io/observe888-visit-hub/notes/">
</head>
<body>
  <main class="shell">
    <nav class="topnav" aria-label="頁面導覽">
      <a class="back-link" href="../">回到首頁</a>
      <span class="topnav-brand">見觀結構</span>
    </nav>

    <header class="hero">
      <span class="eyebrow">入口整併</span>
      <div class="hero-copy">
        <h1>這個入口已整併到身體觀察筆記</h1>
        <p>你原本想找的公開內容，現在都集中在 `notes/`：包含主題總整理頁、身體觀察筆記與各篇公開文章。</p>
        <p>如果瀏覽器沒有自動跳轉，直接點下面的「身體觀察筆記」即可。</p>
      </div>
    </header>

    <section class="content-card">
        <h2>現在改從這裡進入</h2>
        <ul>
          <li>主題總整理頁：先把同一條身體路徑裡常一起出現的問題收在一起看。</li>
          <li>身體觀察筆記：直接看各篇公開文章與長尾搜尋入口。</li>
          <li>品牌理解頁：如果你要先理解見觀結構的整理方式，再回 `about/`。</li>
        </ul>
      </section>

    <div class="cta-strip" aria-label="頁面入口">
        <a class="button is-forest" href="../notes/">身體觀察筆記</a>
        <a class="button" href="../about/">認識見觀結構</a>
        <a class="button is-ghost" href="../">回到首頁</a>
        <a class="button is-ghost" href="https://www.observe888.com/">回到導航頁</a>
    </div>
  </main>

  <script src="../observe888-tracking-config.js"></script>
  <script src="../observe888-tracking.js"></script>
  <script>
    const pageTracker = window.Observe888Tracker;
    if (pageTracker && typeof pageTracker.trackPageView === 'function') {
      pageTracker.trackPageView('page_view_observations_redirect', { page_role: 'observations_redirect' });
    }
  </script>
</body>
</html>
