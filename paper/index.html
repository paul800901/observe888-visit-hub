<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, follow">
  <meta http-equiv="refresh" content="0; url=/notes/">
  <link rel="canonical" href="https://www.observe888.com/notes/">
  <title>案例分享與知識分享已整理到身體觀察筆記｜見觀結構</title>
</head>
<body>
  <p>案例分享、知識分享與健身觀念已整理到身體觀察筆記，正在前往 <a href="/notes/">身體觀察筆記</a>。</p>
  <script>
    (function () {
      const target = new URL('/notes/', window.location.origin);
      const passthroughKeys = ['gclid', 'gbraid', 'wbraid', 'fbclid', 'msclkid'];
      const incoming = new URLSearchParams(window.location.search);

      incoming.forEach(function (value, key) {
        const lowerKey = key.toLowerCase();
        if (lowerKey.indexOf('utm_') === 0 || passthroughKeys.indexOf(lowerKey) !== -1) {
          target.searchParams.append(key, value);
        }
      });

      window.location.replace(target.toString());
    }());
  </script>
</body>
</html>
